<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeakFit | Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
      padding: 2rem;
    }
    .login-box {
      background: var(--bg-card);
      padding: 3rem;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border-color);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      text-align: center;
    }
    .login-box h2 { margin-bottom: 0.5rem; }
    .login-box p { color: var(--text-muted); margin-bottom: 2rem; }
    .login-box input {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      border-radius: 8px;
      box-sizing: border-box;
    }
    .login-box .btn { width: 100%; margin-top: 1rem; }
    .login-footer { margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted); }
    .login-footer a { color: var(--accent-blue); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="logo">PeakFit</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="classes.html">Classes</a>
      <a href="contact.html">Contact</a>
      <a href="login.html" class="btn" style="padding:0.4rem 1rem; font-size:0.9rem;">Login</a>
    </nav>
  </header>

  <main class="login-container">
    <div class="login-box">
      <h2>Welcome Back</h2>
      <p>Sign in to track your progress</p>
      
      <form id="loginForm">
        <input type="email" placeholder="Email Address" required>
        <input type="password" placeholder="Password" required>
        <button type="submit" class="btn">Sign In</button>
      </form>

      <div class="login-footer">
        Don't have an account? <a href="#">Sign Up</a>
      </div>
    </div>
  </main>

  <script>
    // Mock Login: Just redirects to dashboard
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      // Simulate loading
      const btn = e.target.querySelector('.btn');
      btn.textContent = 'Signing in...';
      
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 800);
    });
  </script>
</body>
</html>
