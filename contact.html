<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeakFit | Contact</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo">PeakFit</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="classes.html">Classes</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <h1>Get In Touch</h1>
    </section>
    <section class="content">
      <p>Ready to start? Drop by for a tour or send us a message below.</p>
      
      <!-- NEW FORM STARTS HERE -->
      <form id="contactForm" class="contact-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required rows="5" placeholder="I'd like to book a trial session..."></textarea>
        </div>
        <button type="submit" class="btn" id="submitBtn">Send Message</button>
        <p id="formStatus" class="form-status"></p>
      </form>
      <!-- NEW FORM ENDS HERE -->
    </section>
  </main>

  <footer>
    <p>&copy; 2026 PeakFit Fitness. Built for performance.</p>
  </footer>

  <script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const status = document.getElementById('formStatus');
      const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        message: document.getElementById('message').value
      };

      btn.disabled = true;
      btn.textContent = 'Sending...';
      status.textContent = '';

      try {
        const res = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        const data = await res.json();

        if (res.ok) {
          status.textContent = '✅ Message sent! We\'ll reply shortly.';
          status.style.color = '#4ade80';
          document.getElementById('contactForm').reset();
        } else {
          throw new Error(data.error || 'Failed');
        }
      } catch (err) {
        status.textContent = '❌ ' + err.message;
        status.style.color = '#f87171';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Message';
      }
    });
  </script>
</body>
</html>
