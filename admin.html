<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeakFit | Admin Panel</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .admin-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: 12px; overflow: hidden; }
    .admin-table th, .admin-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
    .admin-table th { background: var(--bg-dark); font-weight: 600; color: var(--accent-blue); }
    .admin-table tr:hover { background: var(--bg-hover); }
    .status-badge { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    .status-new { background: rgba(0, 212, 255, 0.2); color: var(--accent-blue); }
    .login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .login-box { background: var(--bg-card); padding: 2rem; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; }
    .login-box input { width: 100%; padding: 0.8rem; margin: 1rem 0; background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 8px; }
    .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <header>
    <div class="logo">PeakFit</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="classes.html">Classes</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div id="loginOverlay" class="login-overlay">
    <div class="login-box">
      <h2>🔒 Admin Access</h2>
      <p style="color:var(--text-muted); margin-bottom:1rem;">Enter your admin key to continue</p>
      <input type="password" id="adminKey" placeholder="Admin Key" autocomplete="off">
      <button class="btn" onclick="verifyAdmin()">Unlock Panel</button>
      <p id="loginError" style="color:#f87171; margin-top:0.5rem; display:none;">Invalid key</p>
    </div>
  </div>

  <main class="admin-container">
    <div class="admin-header">
      <h1>📊 Contact Inquiries</h1>
      <button class="btn" onclick="loadInquiries()" style="padding:0.5rem 1rem;">🔄 Refresh</button>
    </div>
    <div id="tableContainer">
      <div class="empty-state">Loading submissions...</div>
    </div>
  </main>

  <script>
    let adminKey = '';

    function verifyAdmin() {
      const input = document.getElementById('adminKey').value.trim();
      if (!input) return;
      adminKey = input;
      loadInquiries();
    }

    async function loadInquiries() {
      const container = document.getElementById('tableContainer');
      container.innerHTML = '<div class="empty-state">⏳ Fetching data...</div>';

      try {
        const res = await fetch(`/api/admin/inquiries?key=${encodeURIComponent(adminKey)}`);
        if (!res.ok) {
          document.getElementById('loginOverlay').style.display = 'flex';
          document.getElementById('loginError').style.display = 'block';
          return;
        }

        const data = await res.json();
        document.getElementById('loginOverlay').style.display = 'none';

        if (data.length === 0) {
          container.innerHTML = '<div class="empty-state">📭 No inquiries yet. Check back after someone submits the contact form!</div>';
          return;
        }

        let html = `
          <table class="admin-table">
            <thead>
              <tr><th>Name</th><th>Email</th><th>Message</th><th>Date</th><th>Status</th></tr>
            </thead>
            <tbody>`;
        
        data.forEach(row => {
          const date = new Date(row.created_at).toLocaleString();
          html += `
            <tr>
              <td><strong>${escapeHtml(row.name)}</strong></td>
              <td>${escapeHtml(row.email)}</td>
              <td style="max-width:300px; white-space:pre-wrap;">${escapeHtml(row.message)}</td>
              <td style="color:var(--text-muted); font-size:0.9rem;">${date}</td>
              <td><span class="status-badge status-new">New</span></td>
            </tr>`;
        });

        html += '</tbody></table>';
        container.innerHTML = html;

      } catch (err) {
        container.innerHTML = `<div class="empty-state">❌ Error loading data. Check console.</div>`;
        console.error(err);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Allow Enter key to submit
    document.getElementById('adminKey').addEventListener('keypress', e => {
      if (e.key === 'Enter') verifyAdmin();
    });
  </script>
</body>
</html>
