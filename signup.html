<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeakFit | Sign Up</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container { display:flex; justify-content:center; align-items:center; min-height:80vh; padding:2rem; }
    .auth-box { background:var(--bg-card); padding:2.5rem; border-radius:12px; width:100%; max-width:420px; border:1px solid var(--border-color); }
    .auth-box h2 { margin-bottom:0.5rem; text-align:center; }
    .auth-box p { color:var(--text-muted); text-align:center; margin-bottom:1.5rem; }
    .auth-box input { width:100%; padding:0.8rem; margin-bottom:1rem; background:var(--bg-dark); border:1px solid var(--border-color); color:var(--text-main); border-radius:8px; box-sizing:border-box; }
    .auth-box .btn { width:100%; margin-top:0.5rem; }
    .auth-footer { text-align:center; margin-top:1.5rem; font-size:0.9rem; color:var(--text-muted); }
    .auth-footer a { color:var(--accent-blue); text-decoration:none; }
    .error-msg { color:#f87171; text-align:center; margin-bottom:1rem; display:none; }
  </style>
</head>
<body>
  <header>
    <div class="logo">PeakFit</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="classes.html">Classes</a>
      <a href="contact.html">Contact</a>
      <a href="login.html" class="btn" style="padding:0.4rem 1rem; font-size:0.9rem;">Login</a>
    </nav>
  </header>

  <main class="auth-container">
    <div class="auth-box">
      <h2>Create Account</h2>
      <p>Start your fitness journey today</p>
      <div id="errorMsg" class="error-msg"></div>
      <form id="signupForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btn">Sign Up</button>
      </form>
      <div class="auth-footer">Already have an account? <a href="login.html">Login</a></div>
    </div>
  </main>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('.btn');
      const errorEl = document.getElementById('errorMsg');
      btn.textContent = 'Creating...'; btn.disabled = true;
      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('pf_token', `user_${data.userId || Date.now()}`);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.textContent = 'Sign Up'; btn.disabled = false;
      }
    });
    // Theme Toggle
function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  html.setAttribute('data-theme', isLight ? 'dark' : 'light');
  document.querySelector('.theme-toggle').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('peakfit-theme', isLight ? 'dark' : 'light');
}
const savedTheme = localStorage.getItem('peakfit-theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
document.querySelector('.theme-toggle').textContent = savedTheme === 'light' ? '☀️' : '🌙';
  </script>
</body>
</html>
